name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  cfx-portal-upload:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Update Test Asset Version
        id: update-test-version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          workdir="$(mktemp -d)"

          unzip -q ./test.zip -d "$workdir"
          sed -i -E "s/^version ['\"][^'\"]+['\"]/version \"${version}\"/" "$workdir/test/fxmanifest.lua"

          rm ./test.zip
          (cd "$workdir" && zip -qr "$GITHUB_WORKSPACE/test.zip" test)

      - name: Test Local Action
        id: cfx-portal-upload
        uses: ./
        with:
          assetName: testfs
          cookie: ${{ secrets.FORUM_COOKIE }}
          zipPath: ./test.zip
          assetId: 489345
